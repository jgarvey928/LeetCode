name: Auto-Update README

on:
  push:
    branches:
      - main
    paths:
      - '[0-9][0-9][0-9][0-9]-**/*'

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      # 1. Wait 15 seconds to let the LeetCode extension finish its automatic commits
      - name: Wait for extension to finish
        run: sleep 10

      # 2. Pull the latest code (which will include the extension's messy README)
      - name: Sync latest changes
        run: git pull origin main

      # 3. NOW run our script, which will completely overwrite the messy README with our clean one
      - name: Run script to update README
        run: python generate_readme.py

      # 4. Save and forcefully push the clean README back to GitHub
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          
          git diff --quiet && git diff --staged --quiet || git commit -m "docs: auto-update README table and clean up extension mess"
          
          # Push the clean README
          git push
