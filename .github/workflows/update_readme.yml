name: Auto-Update README

on:
  push:
    branches:
      - main

# This cancels any overlapping runs to keep things lightning fast
concurrency:
  group: readme-update
  cancel-in-progress: true

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      # THE SMART WAIT: Polls every 2 seconds instead of waiting a flat 30 seconds!
      - name: Smart Wait for Topics
        run: |
          echo "Checking for LeetCode topics..."
          for i in {1..10}; do
            git pull origin main --rebase
            
            # Check if the extension has dropped the "## " topics into our invisible tags
            if awk '//,//' README.md | grep -q "## "; then
              echo "Topics detected! Firing Python script instantly!"
              break
            fi
            
            echo "Topics not here yet, waiting 2 seconds..."
            sleep 2
          done

      - name: Run script to completely overwrite README
        run: python generate_readme.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          
          git diff --quiet && git diff --staged --quiet || git commit -m "docs: auto-update README table and clean up extension"
          
          git push origin main
