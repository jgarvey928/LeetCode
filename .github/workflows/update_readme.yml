name: Auto-Update README

on:
  push:
    branches:
      - main
    paths:
      - '[0-9][0-9][0-9][0-9]-**/*'

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      # 1. Wait 15 seconds to let the LeetCode extension finish making its mess
      - name: Wait for extension to finish
        run: sleep 15

      # 2. Download the exact state of the repo (including the extension's bad README)
      - name: Sync latest changes
        run: |
          git fetch origin main
          git reset --hard origin/main

      # 3. Run our script, which will completely overwrite the bad README with our clean one
      - name: Run script to update README
        run: python generate_readme.py

      # 4. Save and forcefully push the clean README back to GitHub
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          
          git diff --quiet && git diff --staged --quiet || git commit -m "docs: auto-update README table and clean up extension mess"
          
          git push origin main
