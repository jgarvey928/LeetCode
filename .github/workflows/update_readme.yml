name: Auto-Update README

on:
  push:
    branches:
      - main

# This stops the bot from running twice at the exact same time
concurrency:
  group: readme-update
  cancel-in-progress: true

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      # Wait to make sure the extension is completely finished saving
      - name: Wait for extension to finish
        run: sleep 15

      - name: Sync latest changes
        run: git pull origin main --rebase

      - name: Run script to completely overwrite README
        run: python generate_readme.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          
          git diff --quiet && git diff --staged --quiet || git commit -m "docs: auto-update README table and clean up extension"
          
          git push origin main
